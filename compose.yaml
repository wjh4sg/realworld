services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-this-local-dev-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-realworld}
      MYSQL_USER: ${MYSQL_USER:-realworld}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-this-local-dev-app-password}
    ports:
      - "${MYSQL_HOST_PORT:-13306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CONFIG_PATH: /app/config.yaml
      SERVER_PORT: "8080"
      SERVER_RATE_LIMIT_PER_MINUTE: ${SERVER_RATE_LIMIT_PER_MINUTE:-60}
      SERVER_RATE_LIMIT_PER_HOUR: ${SERVER_RATE_LIMIT_PER_HOUR:-1000}
      MYSQL_ADDR: mysql:3306
      MYSQL_USERNAME: ${MYSQL_USER:-realworld}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-this-local-dev-app-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-realworld}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET:-change-this-local-dev-jwt-secret}
    ports:
      - "${APP_HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  mysql-data:
  redis-data:
